    <style>
        :root {
            --bg:     #F5F0E8;
            --card:   #FFFDF8;
            --dark:   #2B2420;
            --mid:    #5C4A3A;
            --accent: #B05C2B;
            --green:  #3A7D44;
            --blue:   #2B5F8E;
            --teal:   #1E7A6E;
            --purple: #6B3FA0;
            --gold:   #C8922A;
            --shadow: rgba(43,36,32,0.12);
            --border: #D4C4B0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* ===== شاشة الاختيار ===== */
        #screen-select {
            background: var(--card);
            border-radius: 28px;
            box-shadow: 0 8px 32px var(--shadow);
            max-width: 520px;
            width: 100%;
            padding: 28px 20px;
            border: 2px solid var(--border);
        }
        .select-header { text-align: center; margin-bottom: 22px; }
        .select-title  { font-size: 24px; color: var(--accent); font-weight: bold; margin-bottom: 5px; }
        .select-sub    { font-size: 16px; color: var(--mid); }
        .huroof-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 18px;
        }
        .harf-btn {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 12px 6px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }
        .harf-btn:active { transform: scale(0.94); }
        .harf-btn.done   { background: #E8F5EC; border-color: var(--green); }
        .harf-btn-char   { font-size: 40px; font-weight: bold; color: var(--dark); line-height: 1.2; }
        .harf-btn-name   { font-size: 11px; color: var(--mid); margin-top: 3px; }
        .harf-btn-check  { font-size: 14px; color: var(--green); margin-top: 2px; }
        .select-footer   { text-align: center; font-size: 12px; color: #A08C78; margin-top: 6px; }

        /* ===== شاشة الدرس ===== */
        #screen-lesson { display: none; max-width: 520px; width: 100%; }
        .card {
            background: var(--card);
            border-radius: 28px;
            box-shadow: 0 8px 32px var(--shadow);
            width: 100%;
            padding: 24px 20px;
            border: 2px solid var(--border);
        }
        .header {
            text-align: center;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
            position: relative;
        }
        .back-btn {
            position: absolute; right: 0; top: 50%;
            transform: translateY(-50%);
            background: var(--bg); border: 1.5px solid var(--border);
            border-radius: 10px; padding: 4px 10px;
            font-size: 13px; color: var(--mid);
            cursor: pointer; font-family: inherit; font-weight: 600;
        }
        .app-title    { font-size: 17px; color: var(--mid); font-weight: 600; margin-bottom: 4px; }
        .lesson-badge {
            display: inline-block; background: var(--accent);
            color: white; font-size: 15px; font-weight: bold;
            padding: 4px 14px; border-radius: 14px;
        }
        .progress-section { margin-bottom: 12px; }
        .progress-label {
            display: flex; justify-content: space-between;
            font-size: 15px; color: var(--mid);
            margin-bottom: 5px; font-weight: 600;
        }
        .progress-bar-bg { background: var(--border); border-radius: 8px; height: 13px; overflow: hidden; }
        .progress-bar-fill {
            background: linear-gradient(90deg, var(--gold), var(--accent));
            height: 100%; border-radius: 8px; transition: width 0.5s ease;
        }
        .stage-type {
            text-align: center; font-size: 19px; color: var(--accent);
            font-weight: bold; margin-bottom: 8px; min-height: 26px;
        }

        /* ===== منطقة الحرف ===== */
        .display-area {
            display: flex; align-items: center;
            justify-content: center; gap: 10px;
            margin-bottom: 10px; min-height: 130px;
        }
        .char-box { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .char-display {
            font-size: 96px; color: var(--dark);
            font-weight: bold; line-height: 1.1;
            text-shadow: 2px 3px 8px var(--shadow);
        }
        .char-label {
            font-size: 12px; color: var(--mid); font-weight: 600;
            background: #EEE8DF; padding: 2px 8px;
            border-radius: 8px; text-align: center;
        }
        .arrow { font-size: 26px; color: var(--border); display: none; }
        .arrow.show { display: block; }
        /* مربع الشكل في الموضع (أخضر للموضع، تيل للصوت) */
        .pos-box  { display: none; flex-direction: column; align-items: center; gap: 4px; }
        .pos-box.show { display: flex; }
        .pos-char {
            font-size: 96px; font-weight: bold; line-height: 1.1;
            text-shadow: 2px 3px 8px var(--shadow);
        }
        .pos-char.color-pos   { color: var(--green); }
        .pos-char.color-sound { color: var(--teal); }
        .pos-label {
            font-size: 12px; font-weight: 600;
            padding: 2px 8px; border-radius: 8px; text-align: center;
        }
        .pos-label.color-pos   { color: var(--green);  background: #E8F5EC; }
        .pos-label.color-sound { color: var(--teal);   background: #E0F2F0; }

        /* ===== الكلمة ===== */
        .word-display {
            text-align: center; font-size: 46px; font-weight: bold;
            color: var(--blue); min-height: 64px; margin-bottom: 14px;
            display: flex; align-items: center; justify-content: center;
            background: #EEF4FA; border-radius: 14px;
            padding: 8px 14px; border: 2px solid #C0D8EE;
        }
        .hl       { color: var(--accent); text-decoration: underline; text-decoration-color: var(--accent); text-underline-offset: 5px; }
        .hl-sound { color: var(--teal);   text-decoration: underline; text-decoration-color: var(--teal);   text-underline-offset: 5px; }

        /* ===== الأزرار ===== */
        .buttons-grid { display: flex; flex-direction: column; gap: 8px; }
        .btn {
            width: 100%; padding: 14px 16px; font-size: 18px; font-weight: bold;
            border: none; border-radius: 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: transform 0.12s, opacity 0.3s;
            box-shadow: 0 4px 12px var(--shadow);
            color: white; font-family: inherit;
        }
        .btn:active { transform: scale(0.97); }
        .btn-listen { background: var(--blue); }
        .btn-erase  { background: var(--accent); }
        .btn-sound  { background: var(--teal); }
        .btn-erase2 { background: var(--purple); }
        .btn-speak  { background: #7B5B3A; }
        .nav-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-prev { background: var(--mid); }
        .btn-next { background: var(--green); }
        .btn-locked { opacity: 0.30; pointer-events: none; }
        .btn-hidden { display: none !important; }
        .step-num {
            background: rgba(255,255,255,0.25); border-radius: 50%;
            width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: bold; flex-shrink: 0;
        }
        .encourage {
            text-align: center; font-size: 17px; color: var(--green);
            font-weight: bold; min-height: 22px; margin-top: 10px;
            opacity: 0; transition: opacity 0.4s;
        }
        .encourage.show { opacity: 1; }
        .footer { margin-top: 14px; text-align: center; font-size: 12px; color: #A08C78; }
    </style>
</head>

<!-- شاشة الدرس -->

        </div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
    </div>
    <div class="stage-type" id="stage-type"></div>
    <div class="display-area">
        <div class="char-box">
            <div class="char-display" id="char-display"></div>
            <div class="char-label"  id="char-label">الْحَرْفُ</div>
        </div>
        <div class="arrow" id="arrow">&#8592;</div>
        <div class="pos-box" id="pos-box">
            <div class="pos-char"  id="pos-char"></div>
            <div class="pos-label" id="pos-label"></div>
        </div>
    </div>
    <div class="word-display" id="word-display"></div>
    <div class="buttons-grid">
        <button class="btn btn-listen" id="btn1" onclick="do1()">
            <span class="step-num">١</span> &#128266; اسْمَعِ الْكَلِمَةَ
        </button>
        <button class="btn btn-erase btn-locked" id="btn2" onclick="do2()">
            <span class="step-num">٢</span> &#128269; أَيْنَ الْحَرْفُ فِي الْكَلِمَةِ؟
        </button>
        <button class="btn btn-sound btn-locked btn-hidden" id="btn3" onclick="do3()">
            <span class="step-num">٣</span> &#127925; اسْمَعِ الصَّوْتَ
        </button>
        <button class="btn btn-erase2 btn-locked btn-hidden" id="btn4" onclick="do4()">
            <span class="step-num">٤</span> &#128270; أَيْنَ الْحَرْفُ مُشَكَّلاً؟
        </button>
        <button class="btn btn-speak btn-locked btn-hidden" id="btn5" onclick="do5()">
            <span class="step-num">٥</span> &#127908; انْطِقِ الْحَرْفَ
        </button>
        <div class="nav-row">
            <button class="btn btn-prev" onclick="stageGo(-1)">&#9664; السَّابِق</button>
            <button class="btn btn-next" onclick="stageGo(+1)">التَّالِي &#9654;</button>
        </div>
    </div>
    <div class="encourage" id="encourage"></div>
</div>
<div class="footer">رنيم فاي &middot; سميرة عبد الصدوق &copy; 2026</div>

var NO_FWD = "\u0627\u0623\u0625\u0622\u062F\u0630\u0631\u0632\u0648\u0624\u0621";
var currentHarfIdx = 0;
var currentStage   = 0;

/* ===== حفظ التقدم ===== */
function saveP() { try { localStorage.setItem("tmm_h", currentHarfIdx); localStorage.setItem("tmm_s", currentStage); } catch(e){} }
function getDone() { try { return JSON.parse(localStorage.getItem("tmm_done")) || []; } catch(e){ return []; } }
function markDone(i) { var d=getDone(); if(d.indexOf(i)===-1){d.push(i);} try{localStorage.setItem("tmm_done",JSON.stringify(d));}catch(e){} }

/* ===== شاشة الاختيار ===== */
function buildSelect() {
    var g = document.getElementById("huroof-grid");
    g.innerHTML = "";
    var done = getDone();
    for (var i=0; i<DB.huroof.length; i++) {
        var h = DB.huroof[i];
        var isDone = done.indexOf(i) !== -1;
        var b = document.createElement("button");
        b.className = "harf-btn" + (isDone?" done":"");
        b.innerHTML = "<div class=\"harf-btn-char\">"+h.harf+"</div>"+
                      "<div class=\"harf-btn-name\">"+h.name+"</div>"+
                      (isDone?"<div class=\"harf-btn-check\">&#10003;</div>":"");
        b.setAttribute("data-i", i);
        b.onclick = function(){ openLesson(parseInt(this.getAttribute("data-i"))); };
        g.appendChild(b);
    }
}

function openLesson(idx) {
    currentHarfIdx = idx;
    currentStage = 0;
    try {
        if (parseInt(localStorage.getItem("tmm_h"))===idx) {
            var s = parseInt(localStorage.getItem("tmm_s"));
            if (!isNaN(s)) currentStage = s;
        }
    } catch(e){}
    document.getElementById("screen-select").style.display = "none";
    document.getElementById("screen-lesson").style.display = "block";
    renderLesson();
}

function goBack() {
    document.getElementById("screen-lesson").style.display = "none";
    document.getElementById("screen-select").style.display = "block";
    buildSelect();
}

/* ===== رسم الدرس ===== */
function renderLesson() {
    var harf   = DB.huroof[currentHarfIdx];
    var stages = harf.stages;
    var d      = stages[currentStage];
    var total  = stages.length;
    var pct    = Math.round((currentStage+1)/total*100);
    var isPos  = (d.kind === "pos");
    var hasV   = !isPos;

    document.getElementById("lesson-badge").innerText  = "دَرْسُ " + harf.name;
    document.getElementById("stage-type").innerText    = d.t;
    document.getElementById("step-label").innerText    = "الخطوة " + (currentStage+1) + " من " + total;
    document.getElementById("step-pct").innerText      = pct + "%";
    document.getElementById("progress-fill").style.width = pct + "%";
    document.getElementById("char-display").innerText  = d.c;
    document.getElementById("word-display").innerHTML  = d.w;

    /* المربع الأيمن: الحرف المجرد */
    document.getElementById("char-label").innerText = isPos ? "الْحَرْفُ الْمُجَرَّدُ" : "الْحَرْفُ الْمُجَرَّدُ";

    /* المربع الأيسر */
    var posBox   = document.getElementById("pos-box");
    var posChar  = document.getElementById("pos-char");
    var posLabel = document.getElementById("pos-label");
    var arrow    = document.getElementById("arrow");

    /* يظهر دائماً */
    posBox.classList.add("show");
    arrow.classList.add("show");

    if (isPos) {
        /* مرحلة الموضع: أخضر، يعرض cPos */
        posChar.innerText  = d.cPos;
        posChar.className  = "pos-char color-pos";
        posLabel.innerText = posLabel_for(d.p);
        posLabel.className = "pos-label color-pos";
    } else {
        /* مرحلة الحركات: تيل، يعرض soundChar */
        posChar.innerText  = d.soundChar;
        posChar.className  = "pos-char color-sound";
        posLabel.innerText = d.soundLabel;
        posLabel.className = "pos-label color-sound";
    }

    /* الأزرار */
    unlock("btn1"); lock("btn2");
    if (hasV) {
        showBtn("btn3"); lock("btn3");
        showBtn("btn4"); lock("btn4");
        showBtn("btn5"); lock("btn5");
    } else {
        hideBtn("btn3"); hideBtn("btn4"); hideBtn("btn5");
    }
    setEnc("", false);
    saveP();
}

function posLabel_for(p) {
    if (p==="start")   return "أَوَّلُ الْكَلِمَةِ";
    if (p==="middle")  return "وَسَطُ الْكَلِمَةِ";
    if (p==="end_c")   return "آخِرُ الْكَلِمَةِ مُتَّصِل";
    if (p==="end_d")   return "آخِرُ الْكَلِمَةِ مُنْفَصِل";
    return p;
}

/* ===== خطوات التعلم ===== */
function do1() {
    speak(DB.huroof[currentHarfIdx].stages[currentStage].w, 0.55);
    unlock("btn2");
}

function do2() {
    var d = DB.huroof[currentHarfIdx].stages[currentStage];
    document.getElementById("word-display").innerHTML = hlPlain(d.w, d.p, d.c);
    speak("حرف " + DB.huroof[currentHarfIdx].name, 0.6);
    setEnc("هَذَا هُوَ الْحَرْفُ فِي الْكَلِمَةِ", true);
    if (d.kind !== "pos") unlock("btn3");
}

function do3() {
    var d = DB.huroof[currentHarfIdx].stages[currentStage];
    if (!d.sound) return;
    speak(d.sound, 0.4);
    setEnc("اسْتَمِعْ جَيِّداً... " + d.soundLabel, true);
    unlock("btn4");
}

function do4() {
    var d = DB.huroof[currentHarfIdx].stages[currentStage];
    document.getElementById("word-display").innerHTML = hlSound(d.w, d.p, d.kind, d.c);
    speak(d.sound, 0.4);
    setEnc("هَذَا هُوَ " + d.soundLabel + " فِي الْكَلِمَةِ", true);
    unlock("btn5");
}

function do5() {
    var d = DB.huroof[currentHarfIdx].stages[currentStage];
    speak(d.speakText, 0.45);
    setEnc("&#127919; " + d.speakLabel + " - أَحْسَنْتَ!", true);
}


function stageGo(dir) {
    var stages = DB.huroof[currentHarfIdx].stages;
    currentStage = (currentStage + dir + stages.length) % stages.length;
    if (dir > 0 && currentStage === 0) markDone(currentHarfIdx);
    renderLesson();
    if (dir > 0 && currentStage === 0) setEnc("&#127775; أَتْمَمْتَ الدَّرْسَ! أَحْسَنْتَ &#127775;", true);
}

/* ===== تقسيم الكلمة إلى وحدات ===== */
function toUnits(str) {
    var units=[]; var i=0;
    while(i<str.length){
        var u=str[i]; i++;
        while(i<str.length){
            var code=str.charCodeAt(i);
            if((code>=0x064B&&code<=0x065F)||code===0x0670){u+=str[i];i++;}
            else break;
        }
        units.push(u);
    }
    return units;
}
function fwd(u){ return NO_FWD.indexOf(u[0])===-1; }

/* إيجاد موضع الحرف المستهدف في الوحدات */
function findChar(units, harf) {
    var h0 = harf.charCodeAt(0);
    for (var i=0; i<units.length; i++) {
        if (units[i].charCodeAt(0) === h0) return i;
    }
    return -1;
}

/* تمييز الحرف المجرد في الكلمة */
function hlPlain(word, pos, harf) {
    var T="\u0640"; var units=toUnits(word); var out="";
    if (pos==="start") {
        var arm=(units.length>1&&fwd(units[0]))?T:"";
        out="<span class=\"hl\">"+units[0]+arm+"</span>";
        for(var i=1;i<units.length;i++) out+=units[i];
    } else if (pos==="end_c") {
        for(var i=0;i<units.length-1;i++) out+=units[i];
        out+="<span class=\"hl\">"+T+units[units.length-1]+"</span>";
    } else if (pos==="end_d") {
        for(var i=0;i<units.length-1;i++) out+=units[i];
        out+="<span class=\"hl\">"+units[units.length-1]+"</span>";
    } else {
        /* middle */
        var idx=findChar(units, harf);
        if(idx>=0){
            var ab=idx>0?T:""; var aa=(idx<units.length-1&&fwd(units[idx]))?T:"";
            for(var i=0;i<idx;i++) out+=units[i];
            out+="<span class=\"hl\">"+ab+units[idx]+aa+"</span>";
            for(var i=idx+1;i<units.length;i++) out+=units[i];
        } else out=word;
    }
    return out;
}

/* تمييز الحرف مع حركته */
function hlSound(word, pos, kind, harf) {
    var T="\u0640"; var units=toUnits(word); var out="";
    var isLong = (kind==="long_a"||kind==="long_y"||kind==="long_w");
    if (pos==="start") {
        if(isLong&&units.length>1){
            var arm=(units.length>2&&fwd(units[1]))?T:"";
            out="<span class=\"hl-sound\">"+units[0]+units[1]+arm+"</span>";
            for(var i=2;i<units.length;i++) out+=units[i];
        } else {
            var arm=(units.length>1&&fwd(units[0]))?T:"";
            out="<span class=\"hl-sound\">"+units[0]+arm+"</span>";
            for(var i=1;i<units.length;i++) out+=units[i];
        }
    } else if(pos==="end_c"||pos==="end_d"){
        for(var i=0;i<units.length-1;i++) out+=units[i];
        var pre = pos==="end_c" ? T : "";
        out+=pre+"<span class=\"hl-sound\">"+units[units.length-1]+"</span>";
    } else {
        var idx=findChar(units,harf);
        if(idx>=0){
            var ab=idx>0?T:"";
            for(var i=0;i<idx;i++) out+=units[i];
            if(isLong&&idx+1<units.length){
                var aa2=(idx+2<units.length&&fwd(units[idx+1]))?T:"";
                out+="<span class=\"hl-sound\">"+ab+units[idx]+units[idx+1]+aa2+"</span>";
                for(var i=idx+2;i<units.length;i++) out+=units[i];
            } else {
                var aa=(idx<units.length-1&&fwd(units[idx]))?T:"";
                out+="<span class=\"hl-sound\">"+ab+units[idx]+aa+"</span>";
                for(var i=idx+1;i<units.length;i++) out+=units[i];
            }
        } else out=word;
    }
    return out;
}

/* ===== مساعدات ===== */
function speak(text,rate){
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(text);
    u.lang="ar-SA"; u.rate=rate;
    window.speechSynthesis.speak(u);
}
function lock(id){var e=document.getElementById(id);if(e){e.classList.add("btn-locked");e.classList.remove("btn-hidden");}}
function unlock(id){var e=document.getElementById(id);if(e)e.classList.remove("btn-locked");}
function showBtn(id){var e=document.getElementById(id);if(e)e.classList.remove("btn-hidden");}
function hideBtn(id){var e=document.getElementById(id);if(e){e.classList.add("btn-hidden");e.classList.remove("btn-locked");}}
function showEl(id,show){var e=document.getElementById(id);if(!e)return;if(show)e.classList.add("show");else e.classList.remove("show");}
function setEnc(msg,show){var e=document.getElementById("encourage");e.innerHTML=msg;if(show)e.classList.add("show");else e.classList.remove("show");}
